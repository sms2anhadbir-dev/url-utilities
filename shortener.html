<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>EZLink URL Shortener</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand"
       href="index.html">
       EZLink
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse"
         id="navbarNav">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link"
             href="index.html">
             Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link active"
             href="shortener.html">
             URL Shortener
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             href="downloader.html">
             Downloader
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             href="qr.html">
             QR Generator
          </a>
        </li>

      </ul>

    </div>

  </div>

</nav>

<div class="container py-5">

  <h1 class="mb-4">
    URL Shortener
  </h1>

  <div class="card p-4">

    <input
      type="text"
      id="urlInput"
      class="form-control mb-3"
      placeholder="Paste URL here">

    <button
      class="btn btn-primary"
      onclick="shortenUrl()">

      Shorten URL

    </button>

    <div class="mt-3">

      <input
        type="text"
        id="shortenedUrl"
        class="form-control mb-2"
        readonly>

      <button
        class="btn btn-success"
        onclick="copyUrl()">

        Copy

      </button>

    </div>

  </div>

</div>

<script>

function randomCode(length = 6) {

  const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

  let result = "";

  for (let i = 0; i < length; i++) {

    result += chars.charAt(
      Math.floor(Math.random() * chars.length)
    );

  }

  return result;

}

function shortenUrl() {

  const url =
    document.getElementById("urlInput").value.trim();

  if (!url) {

    alert("Paste a URL");

    return;
  }

  const code =
    randomCode();

  localStorage.setItem(
    "ezlink_" + code,
    url
  );

  const shortUrl =
    `${window.location.origin}/url-utilities/go.html?id=${code}`;

  document.getElementById("shortenedUrl").value =
    shortUrl;

}

function copyUrl() {

  const input =
    document.getElementById("shortenedUrl");

  input.select();

  navigator.clipboard.writeText(input.value);

  alert("Copied!");

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/security.js"></script>

</body>
</html>
