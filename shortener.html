<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZLink Shortener</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <h1 class="mb-4">URL Shortener</h1>

  <input type="text" id="urlInput" class="form-control mb-3" placeholder="Paste URL here">

  <button class="btn btn-primary" onclick="shortenURL()">Shorten</button>

  <div class="mt-4">
    <input type="text" id="result" class="form-control mb-2" readonly>
    <button class="btn btn-success" onclick="copyLink()">Copy Link</button>
  </div>
</div>

<script src="js/shortener.js"></script>
<script src="js/security.js"></script>

</body>
</html>
