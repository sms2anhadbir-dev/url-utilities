<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Redirecting...</title>

</head>
<body>

<h2>
  Redirecting...
</h2>

<script>

const params =
  new URLSearchParams(window.location.search);

const id =
  params.get("id");

if (!id) {

  document.body.innerHTML =
    "<h1>Invalid Link</h1>";

} else {

  const url =
    localStorage.getItem("ezlink_" + id);

  if (url) {

    window.location.href = url;

  } else {

    document.body.innerHTML =
      "<h1>Link Not Found</h1>";

  }

}

</script>

</body>
</html>
