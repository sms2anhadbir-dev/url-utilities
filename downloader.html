<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>EZLink Downloader</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand"
       href="index.html">
       EZLink
    </a>

  </div>

</nav>

<div class="container py-5">

  <h1 class="mb-4">
    YouTube Downloader
  </h1>

  <div class="card p-4">

    <label class="form-label">
      YouTube URL
    </label>

    <input
      type="text"
      id="youtubeUrl"
      class="form-control mb-3"
      placeholder="Paste YouTube URL here">

    <label class="form-label">
      Download Type
    </label>

    <select
      id="downloadMode"
      class="form-select mb-3">

      <option value="video">
        Full Video + Audio (MP4)
      </option>

      <option value="videoonly">
        Video Only (MP4)
      </option>

      <option value="audio">
        Audio Only (MP3)
      </option>

    </select>

    <button
      class="btn btn-primary"
      onclick="downloadVideo()">

      Download

    </button>

    <div id="status"
         class="mt-3 text-muted">
    </div>

  </div>

</div>

<script>

function downloadVideo() {

  const url =
    document.getElementById("youtubeUrl").value.trim();

  const mode =
    document.getElementById("downloadMode").value;

  const status =
    document.getElementById("status");

  if (!url) {

    alert("Please paste a YouTube URL");

    return;
  }

  status.innerHTML =
    "Starting download...";

  const backend =
    "https://url-utilities-production.up.railway.app";

  window.open(
    `${backend}/download?url=${encodeURIComponent(url)}&mode=${mode}`,
    "_blank"
  );

}

</script>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
