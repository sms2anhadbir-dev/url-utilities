<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>EZLink Downloader</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand"
       href="index.html">
       EZLink
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse"
         id="navbarNav">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link"
             href="index.html">
             Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             href="shortener.html">
             URL Shortener
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link active"
             href="downloader.html">
             Downloader
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             href="qr.html">
             QR Generator
          </a>
        </li>

      </ul>

    </div>

  </div>

</nav>

<div class="container py-5">

  <h1 class="mb-4">
    YouTube Downloader
  </h1>

  <div class="card p-4">

    <input
      type="text"
      id="youtubeUrl"
      class="form-control mb-3"
      placeholder="Paste YouTube URL">

    <select
      id="downloadMode"
      class="form-select mb-3">

      <option value="video">
        Full Video + Audio (MP4)
      </option>

      <option value="videoonly">
        Video Only
      </option>

      <option value="audio">
        Audio Only (MP3)
      </option>

    </select>

    <button
      class="btn btn-primary"
      onclick="downloadVideo()">

      Download

    </button>

    <div class="mt-3"
         id="status">
    </div>

  </div>

</div>

<script>

function downloadVideo() {

  const url =
    document.getElementById("youtubeUrl").value.trim();

  const mode =
    document.getElementById("downloadMode").value;

  const status =
    document.getElementById("status");

  if (!url) {

    alert("Paste a YouTube URL");

    return;
  }

  status.innerHTML =
    "Starting download...";

  const backend =
    "https://url-utilities-production.up.railway.app";

  window.open(
    `${backend}/download?url=${encodeURIComponent(url)}&mode=${mode}`,
    "_blank"
  );

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/security.js"></script>

</body>
</html>
