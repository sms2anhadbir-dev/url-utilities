  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand"
       href="index.html">
       EZLink
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#nav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse"
         id="nav">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link"
             href="index.html">
             Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             href="shortener.html">
             Shortener
          </a>

        <li class="nav-item">
          <a class="nav-link active"
             href="downloader.html">
             Downloader
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link"
             href="qr.html">
             QR Generator
          </a>
        </li>

      </ul>

    </div>

  </div>

</nav>

<div class="container py-5">

  <h1 class="mb-4">
    YouTube Downloader
  </h1>

  <p class="text-muted mb-4">
    Download YouTube videos using yt-dlp backend.
  </p>

  <div class="card p-4">

    <label class="form-label">
      YouTube URL
    </label>

    <input
      type="text"
      id="youtubeUrl"
      class="form-control mb-3"
      placeholder="Paste YouTube link here">

    <button
      class="btn btn-primary"
      onclick="downloadVideo()">

      Download

    </button>

    <div class="mt-3">

      <small class="text-muted">
        Powered by yt-dlp + Railway backend
      </small>

    </div>

  </div>

</div>

<script>

async function downloadVideo() {

  const url =
    document.getElementById("youtubeUrl").value.trim();

  if (!url) {

    alert("Please paste a YouTube URL");

    return;
  }

  // REPLACE THIS WITH YOUR RAILWAY DOMAIN

  const backend =
    "https://YOUR-RAILWAY-DOMAIN.up.railway.app";

  window.open(
    `${backend}/download?url=${encodeURIComponent(url)}`
  );
}

</script>

<script src="js/security.js"></script>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>
